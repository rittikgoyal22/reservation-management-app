server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA: route unknown paths to index.html (client-side routing / deep links)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # long-cache hashed static assets
    location ~* \.(?:js|css|png|jpe?g|gif|ico|svg|woff2?)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }
}
