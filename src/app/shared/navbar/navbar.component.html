<nav class="etd-navbar navbar navbar-expand-lg navbar-dark shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="#" (click)="goHome($event)">
      <i class="bi bi-airplane-fill me-1"></i> ETD
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#etdNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="etdNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item" *ngFor="let item of navItems">
          <a class="nav-link" [class.active]="isActive(item)"
             href="#" (click)="onNavClick(item, $event)">
            <i class="bi {{ item.icon }} me-1"></i> {{ item.label }}
          </a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-3">
        <span class="badge bg-light text-primary fw-semibold">{{ role }}</span>
        <span class="text-white-50 small d-none d-md-inline">{{ email }}</span>
        <button class="btn btn-outline-light btn-sm" (click)="logout()">
          <i class="bi bi-box-arrow-right me-1"></i> Logout
        </button>
      </div>
    </div>
  </div>
</nav>
